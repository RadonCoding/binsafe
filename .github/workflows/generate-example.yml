name: Generate Example

on:
  push:
    branches:
      - readme-upgrade
jobs:
  generate-example:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-gnu

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 radare2 wine wine32 wine64

      - name: Build for Windows
        run: cargo build --bin obfuscator --release --target x86_64-pc-windows-gnu

      - name: Get notepad.exe
        run: |
          wineboot -u
          cp ~/.wine/drive_c/windows/system32/notepad.exe .

      - name: Run obfuscator
        run: wine target/x86_64-pc-windows-gnu/release/obfuscator.exe notepad.exe --virtualization --mutation

      - name: Generate example
        run: |
          IMAGE=$(docker build -q - <<EOF
          FROM ghcr.io/charmbracelet/vhs
          RUN apt-get update && apt-get install -y radare2
          EOF
          )
          docker run --rm -v $PWD:/vhs $IMAGE vhs example.tape

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "example.gif"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
